name: Update documentation and web flasher

on:
  workflow_dispatch:
    inputs:
      firmware_source:
        description: Firmware to publish with the documentation
        required: true
        default: Use latest release binaries
        type: choice
        options:
          - Use latest release binaries
          - Build preview binaries from selected branch
  release:
    types: [published]

concurrency:
  group: github-pages
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Download latest release binaries
        if: github.event_name == 'workflow_dispatch' && inputs.firmware_source == 'Use latest release binaries'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          release_tag="$(gh release list \
            --exclude-drafts \
            --limit 1 \
            --json tagName \
            --jq '.[0].tagName')"

          if [ -z "$release_tag" ] || [ "$release_tag" = "null" ]; then
            echo "No published firmware release was found."
            echo "Run the workflow again with 'Build preview binaries from selected branch'."
            exit 1
          fi

          release_bundle="web-flasher-${release_tag}.zip"
          mkdir -p _release _firmware
          gh release download "$release_tag" \
            --pattern "$release_bundle" \
            --dir _release
          unzip "_release/$release_bundle" -d _firmware

      - name: Set up Python
        if: github.event_name == 'release' || inputs.firmware_source == 'Build preview binaries from selected branch'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache PlatformIO downloads
        if: github.event_name == 'release' || inputs.firmware_source == 'Build preview binaries from selected branch'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        if: github.event_name == 'release' || inputs.firmware_source == 'Build preview binaries from selected branch'
        run: python -m pip install platformio==6.1.19

      - name: Verify release version
        if: github.event_name == 'release'
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#[vV]}"
          project_version="$(python -c 'from scripts.project_metadata import load_project_metadata; print(load_project_metadata("platformio.ini").version)')"

          if [ "$tag_version" != "$project_version" ]; then
            echo "Release tag $GITHUB_REF_NAME does not match project version $project_version"
            exit 1
          fi

      - name: Build firmware
        if: github.event_name == 'release' || inputs.firmware_source == 'Build preview binaries from selected branch'
        run: python release_build.py

      - name: Write release information
        if: github.event_name == 'release' || inputs.firmware_source == 'Build preview binaries from selected branch'
        env:
          RELEASE_CHANNEL: ${{ github.event_name == 'release' && 'release' || 'preview' }}
          RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || format('preview-{0}', github.run_number) }}
          RELEASE_TIMESTAMP: ${{ github.event.release.published_at }}
        shell: bash
        run: |
          if [ -z "$RELEASE_TIMESTAMP" ]; then
            RELEASE_TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi

          python scripts/write_release_info.py \
            build/release/release-info.json \
            --tag "$RELEASE_TAG" \
            --commit "$GITHUB_SHA" \
            --channel "$RELEASE_CHANNEL" \
            --timestamp "$RELEASE_TIMESTAMP"

      - name: Create release bundle
        if: github.event_name == 'release'
        shell: bash
        run: |
          release_bundle="web-flasher-${GITHUB_REF_NAME}.zip"
          (cd build/release && zip -r "../../$release_bundle" .)
          echo "RELEASE_BUNDLE=$release_bundle" >> "$GITHUB_ENV"

      - name: Attach web flasher bundle to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" "$RELEASE_BUNDLE" --clobber

      - name: Add latest release binaries to site source
        if: github.event_name == 'workflow_dispatch' && inputs.firmware_source == 'Use latest release binaries'
        shell: bash
        run: |
          mkdir -p docs/flash
          cp -a _firmware/. docs/flash/

      - name: Add built binaries to site source
        if: github.event_name == 'release' || inputs.firmware_source == 'Build preview binaries from selected branch'
        shell: bash
        run: |
          mkdir -p docs/flash
          cp -a build/release/. docs/flash/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build site with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Upload downloadable preview
        if: github.event_name == 'workflow_dispatch' && inputs.firmware_source == 'Build preview binaries from selected branch'
        uses: actions/upload-artifact@v4
        with:
          name: web-flasher-preview-${{ github.run_number }}
          path: _site
          retention-days: 14

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
