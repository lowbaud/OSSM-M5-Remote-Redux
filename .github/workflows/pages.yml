name: Build and deploy web flasher

on:
  workflow_dispatch:
    inputs:
      deploy_preview:
        description: Deploy this preview to the public Pages site
        required: true
        default: false
        type: boolean
  release:
    types: [published]

concurrency:
  group: github-pages
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache PlatformIO downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: python -m pip install platformio==6.1.19

      - name: Verify release version
        if: github.event_name == 'release'
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#[vV]}"
          project_version="$(python -c 'from scripts.project_metadata import load_project_metadata; print(load_project_metadata("platformio.ini").version)')"

          if [ "$tag_version" != "$project_version" ]; then
            echo "Release tag $GITHUB_REF_NAME does not match project version $project_version"
            exit 1
          fi

      - name: Build release firmware
        run: python release_build.py

      - name: Write release information
        env:
          RELEASE_CHANNEL: ${{ github.event_name == 'release' && 'release' || 'preview' }}
          RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || format('preview-{0}', github.run_number) }}
          RELEASE_TIMESTAMP: ${{ github.event.release.published_at }}
        shell: bash
        run: |
          if [ -z "$RELEASE_TIMESTAMP" ]; then
            RELEASE_TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi

          python scripts/write_release_info.py \
            build/release/release-info.json \
            --tag "$RELEASE_TAG" \
            --commit "$GITHUB_SHA" \
            --channel "$RELEASE_CHANNEL" \
            --timestamp "$RELEASE_TIMESTAMP"

      - name: Create release bundle
        if: github.event_name == 'release'
        shell: bash
        run: |
          release_bundle="web-flasher-${GITHUB_REF_NAME}.zip"
          (cd build/release && zip -r "../../$release_bundle" .)
          echo "RELEASE_BUNDLE=$release_bundle" >> "$GITHUB_ENV"

      - name: Attach web flasher bundle to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" "$RELEASE_BUNDLE" --clobber

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build site with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Add web flasher firmware
        shell: bash
        run: |
          mkdir -p _site/flash
          cp -a build/release/. _site/flash/

      - name: Upload Pages artifact
        if: github.event_name == 'release' || inputs.deploy_preview
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Upload downloadable preview
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: web-flasher-preview-${{ github.run_number }}
          path: _site
          retention-days: 14

  deploy:
    needs: build
    if: github.event_name == 'release' || inputs.deploy_preview
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
